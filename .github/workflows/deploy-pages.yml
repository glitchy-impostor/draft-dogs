name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Set these in Settings → Secrets and variables → Actions → Variables.
          # VITE_BASE_PATH should be "/<repo-name>/" — e.g. /draft-dogs-redesign/
          # VITE_API_URL is your Railway URL — e.g. https://draft-dogs.up.railway.app
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
