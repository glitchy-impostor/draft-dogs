name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Resolve base path
        id: base
        run: |
          if [ -f public/CNAME ]; then
            DOMAIN=$(head -n1 public/CNAME | tr -d '\r\n')
            echo "value=/" >> "$GITHUB_OUTPUT"
            echo "custom domain detected (public/CNAME → $DOMAIN) — base=/"
          elif [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            echo "value=${{ vars.VITE_BASE_PATH }}" >> "$GITHUB_OUTPUT"
            echo "using VITE_BASE_PATH from repo variable"
          else
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "defaulting to /<repo-name>/ (no CNAME, no variable)"
          fi
      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.value }}
          # Required when the frontend and backend are split deploys (GH Pages
          # + Railway). Leave the variable unset for a single-origin host.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          echo "Building with VITE_BASE_PATH=$VITE_BASE_PATH VITE_API_URL=$VITE_API_URL"
          npm run build
      - name: Show built index.html (top)
        run: |
          echo "----- dist/index.html -----"
          head -40 dist/index.html
          echo "----- dist/ listing -----"
          ls -la dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
