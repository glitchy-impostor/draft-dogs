name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # VITE_BASE_PATH defaults to "/<repo-name>/" using the runtime repo
          # name, so a fresh fork builds correctly out of the box. Override it
          # with the repository variable (Settings → Variables) if you need
          # a custom subpath or you're hosting at a root URL.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH != '' && vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          # Required when the frontend and backend are split deploys (GH Pages
          # + Railway). Leave the variable unset for a single-origin host.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          echo "Building with VITE_BASE_PATH=$VITE_BASE_PATH VITE_API_URL=$VITE_API_URL"
          npm run build
      - name: Show built index.html (top)
        run: |
          echo "----- dist/index.html -----"
          head -40 dist/index.html
          echo "----- dist/ listing -----"
          ls -la dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
